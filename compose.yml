services:
  server:
    container_name: code-lens-server
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
      target: dev
    env_file:
      - .env
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    privileged: false
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "8000"
    networks:
      - code-lens-network
    volumes:
      - ./data:/app/repos
      - ./apps/server:/app/apps/server
      - server_target:/app/target

  wiki:
    container_name: code-lens-wiki
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./apps/wiki/Dockerfile
      target: dev
    env_file:
      - .env
    network_mode: "service:server"
    depends_on:
      server:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - ./apps/wiki/src:/app/apps/wiki/src:cached
      - ./apps/wiki/config:/app/apps/wiki/config:cached
      - ./apps/wiki/package.json:/app/apps/wiki/package.json:cached
      - ./apps/wiki/tsconfig.json:/app/apps/wiki/tsconfig.json:cached
      - ./apps/wiki/eslint.config.js:/app/apps/wiki/eslint.config.js:cached
      - ./data:/app/repos
      - ~/.ssh/id_ed25519:/home/node/.ssh/id_ed25519:ro
      - ~/.ssh/id_ed25519.pub:/home/node/.ssh/id_ed25519.pub:ro
      - ~/.ssh/known_hosts:/home/node/.ssh/known_hosts:rw
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true

  nginx:
    container_name: code-lens-nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      server:
        condition: service_healthy
    networks:
      - code-lens-network

  postgres:
    image: postgres:15
    container_name: code-lens-postgres
    command: postgres -c log_min_messages=ERROR -c log_statement=none -c log_duration=off -c log_min_duration_statement=-1 -c log_checkpoints=off
    ports:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB_NAME}
    networks:
      - code-lens-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "sh -c 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_NAME}'",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    container_name: code-lens-qdrant
    ports:
      - 6333:6333
      - 6334:6334
    expose:
      - 6333
      - 6334
      - 6335
    volumes:
      - ./config/qdrant.yaml:/qdrant/config/production.yaml:ro
      - qdrant_data:/qdrant/storage
    networks:
      - code-lens-network

networks:
  code-lens-network:
    driver: bridge

volumes:
  postgres_data:
  server_target:
  cargo_cache:
  qdrant_data:
